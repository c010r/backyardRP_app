<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backyard Resto Pub POS</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
      color: #f1f5f9;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="spinner"></div>
<script>
  // Redirect inteligente según token y rol
  const token = localStorage.getItem('access_token');
  if (!token) {
    location.href = 'pages/login.html';
  } else {
    try {
      const user = JSON.parse(localStorage.getItem('user_data') || 'null');
      const destinos = {
        administrador: 'pages/dashboard.html',
        supervisor:    'pages/dashboard.html',
        cajero:        'pages/caja.html',
        mozo:          'pages/mesas.html',
        cocina:        'pages/cocina.html',
      };
      location.href = destinos[user?.rol] || 'pages/mesas.html';
    } catch {
      location.href = 'pages/login.html';
    }
  }
</script>
</body>
</html>
