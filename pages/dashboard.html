<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Backyard POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .col-3  { grid-column: span 3; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-8  { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    /* Mini bar chart puro CSS */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 80px;
    }

    .bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar {
      width: 100%;
      background: var(--accent);
      border-radius: 4px 4px 0 0;
      transition: height .5s ease;
      min-height: 4px;
    }

    .bar-label {
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Tabla de top productos */
    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .rank-item:last-child { border-bottom: none; }

    .rank-pos {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .rank-pos.top { background: var(--accent); color: #000; }

    .rank-name { flex: 1; font-size: 13px; font-weight: 600; }
    .rank-val  { font-size: 13px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

    /* Fecha selector */
    .date-filter {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .date-filter input[type="date"] {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 6px 10px;
      font-size: 13px;
      font-family: var(--font-main);
      outline: none;
      cursor: pointer;
    }
    .date-filter input[type="date"]:focus { border-color: var(--accent); }

    /* Alerta stock */
    .stock-alert {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .stock-alert-nombre { font-size: 13px; font-weight: 600; flex: 1; }
    .stock-alert-stock  { font-size: 12px; color: var(--mesa-ocupada); font-weight: 700; }

    @media (max-width: 1100px) {
      .col-3  { grid-column: span 6; }
      .col-4  { grid-column: span 6; }
      .col-8  { grid-column: span 12; }
    }

    @media (max-width: 700px) {
      .col-3, .col-4, .col-6, .col-8 { grid-column: span 12; }
    }
  </style>
</head>
<body>
<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
requireRol('administrador', 'supervisor');

let resumen = null;
let ventasDia = [];
let topProductos = [];
let stockAlertas = [];
let fechaDesde, fechaHasta;

renderLayout({ title: 'Dashboard', activeLink: 'dashboard' });

// Fecha por defecto: hoy
const hoy = new Date().toISOString().split('T')[0];
fechaDesde = hoy;
fechaHasta = hoy;

document.getElementById('topbar-extra').innerHTML = `
  <div class="date-filter">
    <input type="date" id="fecha-desde" value="${hoy}" onchange="cambiarFecha()">
    <span style="color:var(--text-muted);font-size:12px;">a</span>
    <input type="date" id="fecha-hasta" value="${hoy}" onchange="cambiarFecha()">
    <button class="btn-pos secondary sm" onclick="cargar()">🔄 Actualizar</button>
  </div>
`;

function cambiarFecha() {
  fechaDesde = document.getElementById('fecha-desde').value;
  fechaHasta = document.getElementById('fecha-hasta').value;
  cargar();
}

async function cargar() {
  const params = { fecha_desde: fechaDesde, fecha_hasta: fechaHasta };

  try {
    [resumen, ventasDia, topProductos] = await Promise.all([
      ReportesAPI.resumen(params),
      ReportesAPI.ventasPorDia(params),
      ReportesAPI.ventasPorProducto({ ...params, limit: 10 }),
    ]);
  } catch (e) {
    UI.toast('Error al cargar reportes', 'error');
    resumen = {}; ventasDia = []; topProductos = [];
  }

  try {
    const stockData = await ReportesAPI.stock();
    stockAlertas = (stockData.bajo_stock || []).slice(0, 5);
  } catch { stockAlertas = []; }

  renderDashboard();
}

function renderDashboard() {
  const r = resumen || {};
  const totalVentas    = parseFloat(r.total_ventas || 0);
  const totalCobros    = parseFloat(r.total_cobros || 0);
  const ticketPromedio = parseFloat(r.ticket_promedio || 0);
  const cantComandas   = r.cantidad_comandas || 0;
  const cantCubiertos  = r.cubiertos || 0;

  const ventasList = ventasDia.results || ventasDia || [];
  const prodList   = (topProductos.results || topProductos || []).slice(0, 10);

  const content = document.getElementById('content-area');
  content.innerHTML = `
    <div class="dash-grid">

      <!-- Stats principales -->
      <div class="col-3">
        <div class="stat-card">
          <div class="stat-label">Ventas del período</div>
          <div class="stat-value">${UI.moneda(totalVentas)}</div>
          <div class="stat-change">${formatPeriodo()}</div>
        </div>
      </div>
      <div class="col-3">
        <div class="stat-card">
          <div class="stat-label">Comandas</div>
          <div class="stat-value">${cantComandas}</div>
          <div class="stat-change">${cantCubiertos ? `${cantCubiertos} cubiertos` : ''}</div>
        </div>
      </div>
      <div class="col-3">
        <div class="stat-card">
          <div class="stat-label">Ticket promedio</div>
          <div class="stat-value">${UI.moneda(ticketPromedio)}</div>
        </div>
      </div>
      <div class="col-3">
        <div class="stat-card">
          <div class="stat-label">Cobros registrados</div>
          <div class="stat-value">${UI.moneda(totalCobros)}</div>
        </div>
      </div>

      <!-- Gráfico ventas por día -->
      <div class="col-8">
        <div class="card-pos">
          <div class="card-header-pos">📈 Ventas por día</div>
          <div class="card-body-pos">
            ${renderBarChart(ventasList)}
          </div>
        </div>
      </div>

      <!-- Alertas stock -->
      <div class="col-4">
        <div class="card-pos">
          <div class="card-header-pos">
            <span>⚠️ Bajo stock</span>
            <a href="inventario.html" class="btn-pos ghost sm">Ver todo</a>
          </div>
          <div class="card-body-pos">
            ${!stockAlertas.length ? `
              <div class="empty-state" style="padding:20px;">
                <div class="empty-state-icon">✅</div>
                <div class="empty-state-title">Stock OK</div>
              </div>
            ` : stockAlertas.map(s => `
              <div class="stock-alert">
                <span>⚠️</span>
                <span class="stock-alert-nombre">${s.nombre}</span>
                <span class="stock-alert-stock">${s.stock_actual} ${s.unidad}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- Top productos -->
      <div class="col-6">
        <div class="card-pos">
          <div class="card-header-pos">🏆 Top productos</div>
          <div class="card-body-pos" style="padding-top:4px;">
            ${!prodList.length ? `
              <div class="empty-state" style="padding:30px;">
                <div class="empty-state-icon">📦</div>
                <div class="empty-state-title">Sin datos</div>
              </div>
            ` : prodList.map((p, i) => `
              <div class="rank-item">
                <div class="rank-pos ${i < 3 ? 'top' : ''}">${i + 1}</div>
                <div class="rank-name">${p.nombre || p.producto_nombre || '—'}</div>
                <div style="font-size:11px;color:var(--text-muted);margin-right:8px;">${p.cantidad_vendida || 0} uds</div>
                <div class="rank-val">${UI.moneda(p.total_vendido || p.total || 0)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- Desglose por medio de pago -->
      <div class="col-6">
        <div class="card-pos">
          <div class="card-header-pos">💳 Por medio de pago</div>
          <div class="card-body-pos">
            ${renderDesgloseMedios(r)}
          </div>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="col-12">
        <div class="card-pos">
          <div class="card-header-pos">🔗 Accesos rápidos</div>
          <div class="card-body-pos">
            <div style="display:flex;flex-wrap:wrap;gap:10px;">
              ${[
                { href: 'mesas.html',     icon: '🪑', label: 'Mesas' },
                { href: 'caja.html',      icon: '💰', label: 'Caja' },
                { href: 'reservas.html',  icon: '📅', label: 'Reservas' },
                { href: 'pedidos.html',   icon: '📦', label: 'Pedidos online' },
                { href: 'inventario.html',icon: '📋', label: 'Inventario' },
                { href: 'eventos.html',   icon: '🎉', label: 'Eventos' },
              ].map(a => `
                <a href="${a.href}" class="btn-pos secondary" style="font-size:14px;padding:12px 20px;">
                  ${a.icon} ${a.label}
                </a>
              `).join('')}
            </div>
          </div>
        </div>
      </div>

    </div>
  `;
}

function formatPeriodo() {
  if (fechaDesde === fechaHasta) {
    return new Date(fechaDesde + 'T12:00').toLocaleDateString('es-AR', {
      weekday: 'long', day: 'numeric', month: 'long',
    });
  }
  return `${fechaDesde} — ${fechaHasta}`;
}

function renderBarChart(ventas) {
  if (!ventas.length) {
    return `<div class="empty-state" style="padding:30px;"><div class="empty-state-icon">📊</div><div class="empty-state-title">Sin ventas en el período</div></div>`;
  }

  const maxVal = Math.max(...ventas.map(v => parseFloat(v.total || 0)), 1);

  return `
    <div class="bar-chart">
      ${ventas.slice(-14).map(v => {
        const pct = Math.max((parseFloat(v.total || 0) / maxVal) * 100, 2);
        const fecha = new Date(v.fecha + 'T12:00');
        const label = fecha.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
        return `
          <div class="bar-wrap" title="${label}: ${UI.moneda(v.total)}">
            <div class="bar" style="height:${pct}%;"></div>
            <div class="bar-label">${label}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text-muted);text-align:right;">
      Máximo: ${UI.moneda(maxVal)}
    </div>
  `;
}

function renderDesgloseMedios(r) {
  const medios = r.por_medio_pago || {};
  const iconos = {
    efectivo: '💵', debito: '💳', credito: '💳',
    transferencia: '🏦', qr: '📱', mercado_pago: '🟦',
  };

  const entries = Object.entries(medios);
  if (!entries.length) {
    return `<div class="empty-state" style="padding:20px;"><div class="empty-state-title">Sin datos</div></div>`;
  }

  const total = entries.reduce((s, [, v]) => s + parseFloat(v || 0), 0);

  return entries.map(([medio, val]) => {
    const pct = total > 0 ? ((parseFloat(val) / total) * 100).toFixed(0) : 0;
    return `
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;">
          <span>${iconos[medio] || '💰'} ${medio}</span>
          <span style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;">
            ${UI.moneda(val)} <span style="font-weight:400;color:var(--text-muted);">(${pct}%)</span>
          </span>
        </div>
        <div style="height:6px;background:var(--bg-elevated);border-radius:3px;">
          <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:3px;transition:width .5s;"></div>
        </div>
      </div>
    `;
  }).join('');
}

cargar();
</script>
</body>
</html>
