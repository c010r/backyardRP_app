<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocina — Backyard POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { overflow: hidden; }

    /* KDS full-screen */
    .kds-wrapper {
      height: calc(100vh - var(--topbar-height));
      overflow-y: auto;
      background: var(--bg-primary);
    }

    .kds-topbar-extra {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .refresh-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--mesa-libre);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }
    .filter-tab {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Ticket mejorado */
    .kds-ticket {
      display: flex;
      flex-direction: column;
    }

    .kds-ticket-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .kds-mesa-info {
      display: flex;
      flex-direction: column;
    }

    .kds-mesa-num {
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
    }

    .kds-mesa-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .kds-item.destacado {
      background: rgba(245,158,11,.06);
    }

    .kds-ticket-footer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .kds-btn-row {
      display: flex;
      gap: 6px;
    }

    /* Contadores top */
    .kds-counters {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .kds-counter-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .kds-counter-pill.pendiente  { background: rgba(245,158,11,.15); color: var(--accent); }
    .kds-counter-pill.preparando { background: rgba(99,102,241,.15);  color: #6366f1; }
    .kds-counter-pill.listo      { background: rgba(16,185,129,.15);  color: var(--mesa-libre); }

    /* Sonido visual para tickets urgentes */
    @keyframes urgentPulse {
      0%, 100% { border-color: var(--mesa-ocupada); }
      50% { border-color: rgba(239,68,68,.3); }
    }
    .kds-ticket.urgente {
      animation: urgentPulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
requireLogin();

// Solo cocina, supervisores y admins
const user = Auth.getUser();
if (!['administrador','supervisor','cocina'].includes(user?.rol)) {
  UI.toast('Sin permiso para acceder a cocina', 'error');
  setTimeout(() => location.href = 'mesas.html', 1500);
}

let tickets   = [];
let filtroEstado = null; // null = todos excepto ENTREGADO
let intervalId;
let ultimaActualizacion = null;

renderLayout({ title: 'Cocina — Display', activeLink: 'cocina' });

// Topbar extra
document.getElementById('topbar-extra').innerHTML = `
  <div class="kds-topbar-extra">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFiltro(null, this)">Activos</button>
      <button class="filter-tab" onclick="setFiltro('pendiente', this)">Pendiente</button>
      <button class="filter-tab" onclick="setFiltro('en_preparacion', this)">Preparando</button>
      <button class="filter-tab" onclick="setFiltro('listo', this)">Listos</button>
    </div>
    <div class="refresh-indicator">
      <div class="refresh-dot"></div>
      <span id="refresh-label">En vivo</span>
    </div>
  </div>
`;

function setFiltro(estado, btn) {
  filtroEstado = estado;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderKDS();
}

// Layout: contadores + grid
const content = document.getElementById('content-area');
content.className = 'content-area no-padding';
content.style.overflow = 'hidden';
content.style.display = 'flex';
content.style.flexDirection = 'column';
content.innerHTML = `
  <div class="kds-counters" id="kds-counters"></div>
  <div class="kds-wrapper">
    <div class="kds-layout" id="kds-layout">
      <div style="grid-column:1/-1;text-align:center;padding:60px;">
        <div class="spinner-pos" style="width:40px;height:40px;margin:0 auto 16px;"></div>
        <div style="color:var(--text-muted);">Cargando pedidos de cocina...</div>
      </div>
    </div>
  </div>
`;

async function cargar() {
  try {
    const data = await CocinaAPI.pendientes();
    tickets = data.results || data;
    ultimaActualizacion = new Date();
    renderContadores();
    renderKDS();
    document.getElementById('refresh-label').textContent =
      `Actualizado ${ultimaActualizacion.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
  } catch (e) {
    console.error(e);
  }
}

function renderContadores() {
  const c = { pendiente: 0, en_preparacion: 0, listo: 0 };
  tickets.forEach(t => {
    (t.items_cocina || []).forEach(item => {
      if (c[item.estado_cocina] !== undefined) c[item.estado_cocina]++;
    });
  });

  document.getElementById('kds-counters').innerHTML = `
    <div class="kds-counter-pill pendiente">🕐 ${c.pendiente} pendiente${c.pendiente !== 1 ? 's' : ''}</div>
    <div class="kds-counter-pill preparando">🔥 ${c.en_preparacion} preparando</div>
    <div class="kds-counter-pill listo">✅ ${c.listo} listo${c.listo !== 1 ? 's' : ''}</div>
  `;
}

function renderKDS() {
  const grid = document.getElementById('kds-layout');
  if (!grid) return;

  // Filtrar tickets
  let visibles = tickets.filter(t => {
    const items = t.items_cocina || [];
    if (!items.length) return false;
    if (filtroEstado) return items.some(i => i.estado_cocina === filtroEstado);
    // "Activos" = cualquier estado excepto entregado
    return items.some(i => i.estado_cocina !== 'entregado');
  });

  if (!visibles.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;">
        <div class="empty-state" style="padding:80px;">
          <div class="empty-state-icon">✅</div>
          <div class="empty-state-title">Sin pedidos pendientes</div>
          <div class="empty-state-sub">La cocina está al día</div>
        </div>
      </div>
    `;
    return;
  }

  // Ordenar: pendiente primero, luego en_preparacion, luego listo
  const orden = { pendiente: 0, en_preparacion: 1, listo: 2 };
  visibles.sort((a, b) => {
    const ea = estadoPrincipal(a);
    const eb = estadoPrincipal(b);
    if (ea !== eb) return (orden[ea] ?? 3) - (orden[eb] ?? 3);
    return new Date(a.creado_en) - new Date(b.creado_en);
  });

  grid.innerHTML = visibles.map(ticket => renderTicket(ticket)).join('');
}

function estadoPrincipal(ticket) {
  const items = ticket.items_cocina || [];
  if (items.some(i => i.estado_cocina === 'pendiente'))     return 'pendiente';
  if (items.some(i => i.estado_cocina === 'en_preparacion')) return 'en_preparacion';
  return 'listo';
}

function renderTicket(ticket) {
  const items = (ticket.items_cocina || []).filter(i => {
    if (filtroEstado) return i.estado_cocina === filtroEstado;
    return i.estado_cocina !== 'entregado';
  });

  const ep = estadoPrincipal(ticket);
  const tiempoSec = (ticket.minutos_espera || 0) * 60;
  const urgente = tiempoSec > 1200; // >20 min = urgente

  const esComanda = !!ticket.mesa_etiqueta && ticket.mesa_etiqueta !== 'Sin mesa';
  const origenLabel = esComanda
    ? ticket.mesa_etiqueta
    : `Comanda #${ticket.numero || ticket.id}`;

  const mozoLabel = ticket.mozo_nombre ? ticket.mozo_nombre : '';

  return `
    <div class="kds-ticket ${ep.toLowerCase()} ${urgente ? 'urgente' : ''}" id="ticket-${ticket.id}">
      <div class="kds-ticket-header">
        <div class="kds-mesa-info">
          <div class="kds-mesa-num">${origenLabel}</div>
          ${mozoLabel ? `<div class="kds-mesa-sub">${mozoLabel}</div>` : ''}
        </div>
        <div style="text-align:right;">
          <div class="kds-tiempo ${urgente ? 'urgente' : ''}" style="font-family:var(--font-mono);">
            ${formatTiempo(tiempoSec)}
          </div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">
            ${new Date(ticket.creado_en).toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' })}
          </div>
        </div>
      </div>

      <div class="kds-items">
        ${items.map(item => `
          <div class="kds-item ${item.estado_cocina === 'pendiente' ? 'destacado' : ''}">
            <div class="kds-qty">${item.cantidad}×</div>
            <div class="kds-item-info">
              <div class="kds-item-nombre">${item.nombre}</div>
              ${item.observaciones ? `<div class="kds-item-obs">📝 ${item.observaciones}</div>` : ''}
            </div>
            <span class="badge-pos ${item.estado_cocina}" style="font-size:9px;padding:2px 6px;white-space:nowrap;">
              ${item.estado_cocina_display || item.estado_cocina}
            </span>
          </div>
        `).join('')}
      </div>

      <div class="kds-ticket-footer">
        <div class="kds-btn-row">
          ${ep === 'pendiente' ? `
            <button class="btn-pos primary full sm" onclick="avanzarTodo(${ticket.id}, 'en_preparacion')">
              🔥 Empezar a preparar
            </button>
          ` : ''}
          ${ep === 'en_preparacion' ? `
            <button class="btn-pos success full sm" onclick="avanzarTodo(${ticket.id}, 'listo')">
              ✅ Marcar listo
            </button>
          ` : ''}
          ${ep === 'listo' ? `
            <button class="btn-pos ghost full sm" onclick="avanzarTodo(${ticket.id}, 'entregado')">
              🍽️ Entregado
            </button>
          ` : ''}
        </div>
        ${items.length > 1 ? `
          <div class="kds-btn-row">
            ${items.map(item => `
              <button class="btn-pos ghost sm" style="flex:1;font-size:10px;white-space:nowrap;overflow:hidden;"
                      onclick="avanzarItem(${item.id}, '${siguienteEstado(item.estado_cocina)}')">
                ${item.cantidad}× ${item.nombre.substring(0,10)}… →${siguienteEstado(item.estado_cocina)}
              </button>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function formatTiempo(seg) {
  const m = Math.floor(seg / 60);
  const s = seg % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function siguienteEstado(actual) {
  const flujo = { pendiente: 'en_preparacion', en_preparacion: 'listo', listo: 'entregado' };
  return flujo[actual] || actual;
}

async function avanzarTodo(comandaId, nuevoEstado) {
  try {
    if (nuevoEstado === 'listo') {
      await CocinaAPI.marcarLista(comandaId);
    } else {
      const ticket = tickets.find(t => t.id === comandaId);
      const items = (ticket?.items_cocina || []).filter(i => i.estado_cocina !== 'entregado');
      await Promise.all(items.map(i => CocinaAPI.cambiarEstadoItem(i.id, nuevoEstado)));
    }
    UI.toast(`Estado → ${nuevoEstado}`, 'success', 1500);
    await cargar();
  } catch (e) {
    UI.toast(e.message || 'Error al cambiar estado', 'error');
  }
}

async function avanzarItem(itemId, nuevoEstado) {
  try {
    await CocinaAPI.cambiarEstadoItem(itemId, nuevoEstado);
    UI.toast(`Ítem → ${nuevoEstado}`, 'success', 1200);
    await cargar();
  } catch (e) {
    UI.toast(e.message || 'Error al cambiar estado', 'error');
  }
}

// Inicial + auto-refresh cada 15s
cargar();
intervalId = setInterval(cargar, 15000);

window.addEventListener('beforeunload', () => clearInterval(intervalId));
</script>
</body>
</html>
