<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comandas — Backyard POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .comandas-filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .estado-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      transition: all .15s;
      white-space: nowrap;
    }
    .estado-tab:hover { border-color: var(--accent); color: var(--accent); }
    .estado-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .comanda-row {
      display: grid;
      grid-template-columns: 60px 80px 1fr 120px 100px 80px 80px;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      cursor: pointer;
    }
    .comanda-row:hover { background: var(--bg-hover); }
    .comanda-row.header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      font-weight: 600;
      cursor: default;
      background: var(--bg-card);
      border-radius: 10px 10px 0 0;
    }
    .comanda-row.header:hover { background: var(--bg-card); }

    .comanda-num {
      font-weight: 800;
      font-size: 14px;
      color: var(--accent);
    }

    .comanda-mesa { font-weight: 600; }
    .comanda-mozo { color: var(--text-secondary); font-size: 12.5px; }
    .comanda-hora  { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .comanda-total { font-weight: 700; font-variant-numeric: tabular-nums; }
    .comanda-items { font-size: 12px; color: var(--text-muted); }

    .search-top {
      position: relative;
      flex: 1;
      max-width: 280px;
    }
    .search-top input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 7px 12px 7px 34px;
      font-size: 13px;
      font-family: var(--font-main);
      outline: none;
      transition: border-color .15s;
    }
    .search-top input:focus { border-color: var(--accent); }
    .search-top-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px; opacity: .5;
      pointer-events: none;
    }
  </style>
</head>
<body>
<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
requireLogin();

let comandas = [];
let filtroEstado = 'abierta'; // Por defecto mostrar abiertas
let busqueda = '';
let intervalId;

renderLayout({ title: 'Comandas', activeLink: 'comandas' });

document.getElementById('topbar-extra').innerHTML = `
  <div class="comandas-filters" id="top-filters">
    <button class="btn-pos primary sm" onclick="nuevaComanda()">+ Nueva comanda</button>
    <button class="btn-pos secondary sm" onclick="cargar()">🔄</button>
  </div>
`;

async function cargar(forzarFresco = false) {
  try {
    const params = {};
    if (filtroEstado) params.estado = filtroEstado;
    const data = await requestWithCache('GET', '/comandas/', {
      params,
      cacheTTL: 30,
      bypassCache: forzarFresco,
    });
    comandas = data.results || data;
    renderPagina();
  } catch (e) {
    UI.toast('Error al cargar comandas', 'error');
  }
}

function renderPagina() {
  const content = document.getElementById('content-area');
  content.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px;">

      <!-- Filtros -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${[
            { label: 'Todas', val: null },
            { label: '🟡 Abiertas',  val: 'abierta' },
            { label: '🔵 En cocina', val: 'en_cocina' },
            { label: '🟠 Lista',     val: 'lista' },
            { label: '🟢 Cerradas',  val: 'cerrada' },
            { label: '✅ Pagadas',   val: 'pagada' },
          ].map(f => `
            <button class="estado-tab ${filtroEstado === f.val ? 'active' : ''}"
                    onclick="setFiltro(${f.val === null ? 'null' : `'${f.val}'`}, this)">
              ${f.label}
            </button>
          `).join('')}
        </div>
        <div class="search-top">
          <span class="search-top-icon">🔍</span>
          <input type="text" placeholder="Mesa, mozo, #..." oninput="setBusqueda(this.value)" value="${busqueda}">
        </div>
      </div>

      <!-- Resumen rápido -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;" id="resumen-cards">
        ${renderResumen()}
      </div>

      <!-- Lista -->
      <div class="card-pos" style="overflow:hidden;">
        <div class="comanda-row header">
          <span>#</span>
          <span>Mesa</span>
          <span>Mozo</span>
          <span>Abierta</span>
          <span>Estado</span>
          <span>Ítems</span>
          <span>Total</span>
        </div>
        <div id="lista-comandas">
          ${renderListaComandas()}
        </div>
      </div>
    </div>
  `;
}

function renderResumen() {
  const counts = {};
  comandas.forEach(c => { counts[c.estado] = (counts[c.estado] || 0) + 1; });
  return [
    { label: 'Abiertas',  val: counts.abierta || 0,   color: 'var(--accent)' },
    { label: 'En cocina', val: counts.en_cocina || 0, color: '#6366f1' },
    { label: 'Listas',    val: counts.lista || 0,     color: 'var(--mesa-libre)' },
    { label: 'Cerradas',  val: counts.cerrada || 0,   color: 'var(--text-muted)' },
  ].map(s => `
    <div class="stat-card" style="padding:10px;text-align:center;">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="font-size:20px;color:${s.color}">${s.val}</div>
    </div>
  `).join('');
}

function renderListaComandas() {
  let lista = comandas;
  if (busqueda) {
    const q = busqueda.toLowerCase();
    lista = lista.filter(c =>
      String(c.numero || c.id).includes(q) ||
      (c.mesa_etiqueta || '').toLowerCase().includes(q) ||
      (c.mozo_nombre || '').toLowerCase().includes(q)
    );
  }

  if (!lista.length) {
    return `
      <div class="empty-state">
        <div class="empty-state-icon">🧾</div>
        <div class="empty-state-title">Sin comandas</div>
        <div class="empty-state-sub">${busqueda ? 'Sin resultados para tu búsqueda' : 'No hay comandas en este estado'}</div>
      </div>
    `;
  }

  // Ordenar: abiertas primero, luego por hora desc
  const ordenEstado = { abierta: 0, en_cocina: 1, lista: 2, cerrada: 3, pagada: 4 };
  lista.sort((a, b) =>
    (ordenEstado[a.estado] ?? 5) - (ordenEstado[b.estado] ?? 5) ||
    new Date(b.created_at) - new Date(a.created_at)
  );

  return lista.map(c => `
    <div class="comanda-row" onclick="irComanda(${c.id})">
      <span class="comanda-num">#${c.numero || c.id}</span>
      <span class="comanda-mesa">${c.mesa_etiqueta || 'Sin mesa'}</span>
      <span class="comanda-mozo">${c.mozo_nombre || '—'}</span>
      <span class="comanda-hora">${formatHora(c.creado_en)}</span>
      <span><span class="badge-pos ${(c.estado || '').toLowerCase()}">${c.estado || '—'}</span></span>
      <span class="comanda-items">${c.items_count || 0} ítem${c.items_count !== 1 ? 's' : ''}</span>
      <span class="comanda-total">${UI.moneda(c.total || 0)}</span>
    </div>
  `).join('');
}

function formatHora(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

function setFiltro(val, btn) {
  filtroEstado = val;
  document.querySelectorAll('.estado-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  cargar();
}

function setBusqueda(val) {
  busqueda = val;
  const lista = document.getElementById('lista-comandas');
  if (lista) lista.innerHTML = renderListaComandas();
}

function irComanda(id) {
  location.href = `comanda.html?id=${id}`;
}

async function nuevaComanda() {
  // Abrir modal para seleccionar mesa
  try {
    const data = await MesasAPI.listar({ estado: 'libre' });
    const mesasLibres = data.results || data;
    abrirModalNuevaComanda(mesasLibres);
  } catch (e) {
    UI.toast('Error al cargar mesas libres', 'error');
  }
}

function abrirModalNuevaComanda(mesasLibres) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>🧾 Nueva comanda</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div class="form-pos">
            <div class="form-group">
              <label>Mesa</label>
              <select id="nueva-mesa">
                <option value="">Sin mesa (take away)</option>
                ${mesasLibres.map(m => `
                  <option value="${m.id}">Mesa ${m.numero} — ${m.ubicacion_nombre || ''} (cap. ${m.capacidad})</option>
                `).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Observaciones</label>
              <input type="text" id="nueva-obs" placeholder="Opcional">
            </div>
          </div>
          ${!mesasLibres.length ? `
            <div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px;font-size:13px;color:var(--accent);">
              ⚠️ No hay mesas libres. Podés abrir una comanda sin mesa.
            </div>
          ` : ''}
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary" id="btn-crear" onclick="confirmarNuevaComanda()">
            ➕ Crear comanda
          </button>
        </div>
      </div>
    </div>
  `;
}

async function confirmarNuevaComanda() {
  const mesaId = document.getElementById('nueva-mesa')?.value;
  const obs    = document.getElementById('nueva-obs')?.value || '';
  const btn    = document.getElementById('btn-crear');

  await UI.withLoading(btn, async () => {
    try {
      const body = {};
      if (mesaId) body.mesa = parseInt(mesaId);
      if (obs) body.observaciones = obs;
      const comanda = await ComandasAPI.crear(body);
      cerrarModal();
      location.href = `comanda.html?id=${comanda.id}`;
    } catch (e) {
      UI.toast(e.message || 'Error al crear la comanda', 'error');
    }
  });
}

function cerrarModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal-container').innerHTML = '';
}

// Cargar cuando la página se vuelve visible (regresa de comanda.html después de cobrar)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    cargar(true); // Fuerza datos frescos cuando el usuario regresa
  }
});

cargar();
intervalId = setInterval(cargar, 30000);
window.addEventListener('beforeunload', () => clearInterval(intervalId));
</script>
</body>
</html>
