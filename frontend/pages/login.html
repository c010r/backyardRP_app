<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Backyard Resto Pub POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(245,158,11,.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(99,102,241,.06) 0%, transparent 50%);
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900;
      color: #000;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(245,158,11,.3);
    }

    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow-lg);
    }

    .login-card .form-group { margin-bottom: 18px; }

    .login-card label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 11px 14px 11px 42px;
      font-size: 14.5px;
      font-family: var(--font-main);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    .input-icon-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      opacity: .6;
    }

    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-muted);
      font-size: 15px;
      transition: color .15s;
    }

    .toggle-pass:hover { color: var(--text-primary); }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      font-family: var(--font-main);
    }

    .btn-login:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px rgba(245,158,11,.3);
    }

    .btn-login:active { transform: scale(.98); }

    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #ef4444;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.visible { display: flex; }

    .primer-ingreso-banner {
      background: rgba(245,158,11,.12);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .primer-ingreso-banner.visible { display: block; }

    .change-pass-section {
      display: none;
    }

    .change-pass-section.visible { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-brand">
    <div class="login-logo">B</div>
    <div class="login-title">Backyard Resto Pub</div>
    <div class="login-sub">Sistema de gestión POS</div>
  </div>

  <div class="login-card">

    <!-- Error general -->
    <div class="error-msg" id="error-msg">
      <span>⚠️</span>
      <span id="error-text">Error de autenticación</span>
    </div>

    <!-- Banner primer ingreso -->
    <div class="primer-ingreso-banner" id="primer-banner">
      Es tu primer ingreso al sistema. Debés establecer una nueva contraseña.
    </div>

    <!-- Formulario login -->
    <div id="login-section">
      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Ingresá tu usuario"
              autocomplete="username"
              required
              autofocus
            >
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ingresá tu contraseña"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-pass" id="toggle-pass" tabindex="-1">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <span>Ingresar</span>
        </button>
      </form>
    </div>

    <!-- Cambio de contraseña (primer ingreso) -->
    <div class="change-pass-section" id="change-pass-section">
      <form id="change-pass-form">
        <div class="form-group">
          <label for="new-pass">Nueva contraseña</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔑</span>
            <input
              type="password"
              id="new-pass"
              placeholder="Mínimo 8 caracteres"
              autocomplete="new-password"
              required
              minlength="8"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-pass">Confirmar contraseña</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔑</span>
            <input
              type="password"
              id="confirm-pass"
              placeholder="Repetí la contraseña"
              autocomplete="new-password"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-change">
          <span>Establecer contraseña</span>
        </button>
      </form>
    </div>

  </div>

  <div class="login-footer">
    Backyard Resto Pub &copy; 2025 — POS v1.0
  </div>
</div>

<div id="toast-container" class="toast-container-pos"></div>

<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
  // Si ya está logueado, redirigir
  if (Auth.isLoggedIn()) {
    window.location.href = 'mesas.html';
  }

  const loginForm      = document.getElementById('login-form');
  const changPassForm  = document.getElementById('change-pass-form');
  const errorMsg       = document.getElementById('error-msg');
  const errorText      = document.getElementById('error-text');
  const primerBanner   = document.getElementById('primer-banner');
  const loginSection   = document.getElementById('login-section');
  const changeSection  = document.getElementById('change-pass-section');
  const btnLogin       = document.getElementById('btn-login');
  const btnChange      = document.getElementById('btn-change');
  const togglePass     = document.getElementById('toggle-pass');
  const passInput      = document.getElementById('password');

  // Toggle visibilidad contraseña
  togglePass.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    togglePass.textContent = isPass ? '🙈' : '👁️';
  });

  function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function hideError() {
    errorMsg.classList.remove('visible');
  }

  // ---- Login ----
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = passInput.value;

    await UI.withLoading(btnLogin, async () => {
      try {
        const user = await AuthAPI.login(username, password);

        if (user.primer_ingreso) {
          // Mostrar sección cambio de contraseña
          loginSection.style.display = 'none';
          changeSection.classList.add('visible');
          primerBanner.classList.add('visible');
        } else {
          // Redirigir según rol
          redirectByRole(user.rol);
        }
      } catch (err) {
        showError(err.message || 'Usuario o contraseña incorrectos');
      }
    });
  });

  // ---- Cambio de contraseña (primer ingreso) ----
  changPassForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const newPass     = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;

    if (newPass !== confirmPass) {
      showError('Las contraseñas no coinciden');
      return;
    }

    if (newPass.length < 8) {
      showError('La contraseña debe tener al menos 8 caracteres');
      return;
    }

    await UI.withLoading(btnChange, async () => {
      try {
        await api.post('/auth/cambiar-contrasena/', { nueva_password: newPass });
        UI.toast('Contraseña actualizada correctamente', 'success');
        const user = Auth.getUser();
        setTimeout(() => redirectByRole(user?.rol), 800);
      } catch (err) {
        showError(err.message || 'Error al cambiar la contraseña');
      }
    });
  });

  function redirectByRole(rol) {
    const destinos = {
      administrador: 'dashboard.html',
      supervisor:    'dashboard.html',
      cajero:        'caja.html',
      mozo:          'mesas.html',
      cocina:        'cocina.html',
      CLIENTE:       '../index.html',
    };
    window.location.href = destinos[rol] || 'mesas.html';
  }

  // Enter desde username → focus password
  document.getElementById('username').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      passInput.focus();
    }
  });
</script>
</body>
</html>
