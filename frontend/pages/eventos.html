<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos — Backyard POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .ev-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .ev-tab {
      padding: 10px 18px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      font-family: var(--font-main);
    }
    .ev-tab:hover { color: var(--text-primary); }
    .ev-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Evento card */
    .evento-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .evento-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .evento-banner {
      height: 80px;
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      position: relative;
    }
    .evento-banner-estado {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .evento-body { padding: 14px; }
    .evento-nombre { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .evento-fecha  { font-size: 12.5px; color: var(--accent); font-weight: 700; margin-bottom: 8px; }

    .evento-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .evento-stat { display: flex; align-items: center; gap: 4px; }

    .cupos-bar-wrap {
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .cupos-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--mesa-libre);
      transition: width .4s;
    }
    .cupos-bar.casi-lleno { background: var(--accent); }
    .cupos-bar.lleno      { background: var(--mesa-ocupada); }

    /* Scanner QR */
    .scanner-panel {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
    }
    .scanner-input-wrap {
      position: relative;
      margin: 20px 0;
    }
    .scanner-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      outline: none;
      letter-spacing: .1em;
      transition: border-color .15s;
    }
    .scanner-input:focus { border-color: var(--accent); }
    .scanner-input.ok    { border-color: var(--mesa-libre); background: rgba(16,185,129,.05); }
    .scanner-input.error { border-color: var(--mesa-ocupada); background: rgba(239,68,68,.05); }

    .scanner-result {
      background: var(--bg-elevated);
      border-radius: 10px;
      padding: 14px;
      margin-top: 14px;
      text-align: left;
      display: none;
    }
    .scanner-result.visible { display: block; }
    .scanner-result.ok    { border: 1px solid rgba(16,185,129,.3);  }
    .scanner-result.error { border: 1px solid rgba(239,68,68,.3); }

    /* Entradas tabla */
    .entrada-row {
      display: grid;
      grid-template-columns: 1fr 140px 80px 100px 100px 80px;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .entrada-row.header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      font-weight: 600;
      background: var(--bg-card);
    }

    .eventos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
  </style>
</head>
<body>
<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
requireLogin();

const user = Auth.getUser();
const esAdmin = ['administrador','supervisor'].includes(user?.rol);

let seccion = 'eventos';  // 'eventos' | 'scanner' | 'entradas'
let eventos = [];
let entradas = [];
let eventoSeleccionado = null;

renderLayout({ title: 'Eventos', activeLink: 'eventos' });

document.getElementById('topbar-extra').innerHTML = `
  <div style="display:flex;gap:8px;">
    ${esAdmin ? `<button class="btn-pos primary sm" onclick="abrirModalNuevoEvento()">+ Nuevo evento</button>` : ''}
    <button class="btn-pos secondary sm" onclick="cargarSeccion()">🔄</button>
  </div>
`;

function renderTabs() {
  const tabs = [
    { key: 'eventos',  label: '🎉 Eventos'   },
    { key: 'scanner',  label: '📱 Validar QR' },
  ];
  if (esAdmin) tabs.push({ key: 'entradas', label: '🎟️ Entradas' });

  return `
    <div class="ev-tabs">
      ${tabs.map(t => `
        <button class="ev-tab ${seccion === t.key ? 'active' : ''}" onclick="irSeccion('${t.key}')">${t.label}</button>
      `).join('')}
    </div>
  `;
}

function irSeccion(s) {
  seccion = s;
  cargarSeccion();
}

async function cargarSeccion() {
  const content = document.getElementById('content-area');
  content.innerHTML = renderTabs() + `<div style="display:flex;justify-content:center;padding:60px;"><div class="spinner-pos" style="width:32px;height:32px;"></div></div>`;

  if (seccion === 'eventos') {
    try {
      const data = await EventosAPI.adminListar();
      eventos = data.results || data;
      renderEventos();
    } catch { UI.toast('Error al cargar eventos', 'error'); }

  } else if (seccion === 'scanner') {
    renderScanner();

  } else if (seccion === 'entradas') {
    try {
      const params = eventoSeleccionado ? { evento: eventoSeleccionado } : {};
      const data = await api.get('/eventos/entradas/', { params });
      entradas = data.results || data;
      renderEntradas();
    } catch { UI.toast('Error al cargar entradas', 'error'); }
  }
}

// ---- EVENTOS ----
function renderEventos() {
  const content = document.getElementById('content-area');
  content.innerHTML = renderTabs() + `
    <div class="eventos-grid">
      ${!eventos.length ? `
        <div class="empty-state" style="grid-column:1/-1;padding:60px;">
          <div class="empty-state-icon">🎉</div>
          <div class="empty-state-title">Sin eventos configurados</div>
        </div>
      ` : eventos.map(ev => renderEventoCard(ev)).join('')}
    </div>
  `;
}

function renderEventoCard(ev) {
  const tipos = ev.tipos_entrada || [];
  const vendidos  = tipos.reduce((s, t) => s + (t.cupos_vendidos || 0), 0);
  const totalCupos = tipos.reduce((s, t) => s + (t.cupos_totales || 0), 0);
  const pct = totalCupos > 0 ? Math.round((vendidos / totalCupos) * 100) : 0;
  const cls = pct >= 100 ? 'lleno' : pct >= 80 ? 'casi-lleno' : '';

  const emojis = ['🎸', '🎺', '🥁', '🎷', '🎻', '🎹', '🎤'];
  const emoji = emojis[ev.id % emojis.length];

  const fecha = ev.fecha ? new Date(ev.fecha + 'T12:00').toLocaleDateString('es-AR', {
    weekday: 'long', day: 'numeric', month: 'long',
  }) : '—';

  return `
    <div class="evento-card" onclick="abrirDetalleEvento(${ev.id})">
      <div class="evento-banner">
        ${emoji}
        <div class="evento-banner-estado">
          <span class="badge-pos ${ev.activo ? 'listo' : 'entregado'}" style="font-size:10px;">
            ${ev.activo ? 'Activo' : 'Inactivo'}
          </span>
        </div>
      </div>
      <div class="evento-body">
        <div class="evento-nombre">${ev.nombre}</div>
        <div class="evento-fecha">📅 ${fecha} ${ev.hora ? `· ${ev.hora}` : ''}</div>
        <div class="evento-stats">
          <span class="evento-stat">🎟️ ${vendidos}/${totalCupos} entradas</span>
          ${ev.precio_base ? `<span class="evento-stat">💰 desde ${UI.moneda(ev.precio_base)}</span>` : ''}
        </div>
        ${totalCupos > 0 ? `
          <div class="cupos-bar-wrap">
            <div class="cupos-bar ${cls}" style="width:${pct}%;"></div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${pct}% vendido</div>
        ` : ''}
      </div>
    </div>
  `;
}

async function abrirDetalleEvento(id) {
  const ev = eventos.find(e => e.id === id);
  if (!ev) return;

  const tipos = ev.tipos_entrada || [];
  const fecha = ev.fecha ? new Date(ev.fecha + 'T12:00').toLocaleDateString('es-AR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  }) : '—';

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" style="max-width:520px;" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>${ev.nombre}</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div style="background:var(--bg-elevated);border-radius:10px;padding:14px;margin-bottom:14px;font-size:13.5px;line-height:1.8;color:var(--text-secondary);">
            <div>📅 <b style="color:var(--text-primary);">${fecha}</b>${ev.hora ? ` a las <b style="color:var(--accent);">${ev.hora}</b>` : ''}</div>
            ${ev.descripcion ? `<div>📝 ${ev.descripcion}</div>` : ''}
            <div>${ev.activo ? '✅ Activo' : '❌ Inactivo'}</div>
          </div>

          ${tipos.length ? `
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:10px;">Tipos de entrada</div>
            ${tipos.map(t => {
              const pct = t.cupos_totales > 0 ? Math.round((t.cupos_vendidos / t.cupos_totales) * 100) : 0;
              return `
                <div style="background:var(--bg-elevated);border-radius:10px;padding:12px;margin-bottom:8px;">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                    <span style="font-weight:700;">${t.nombre}</span>
                    <span style="font-weight:800;color:var(--accent);">${UI.moneda(t.precio)}</span>
                  </div>
                  <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px;">
                    <span>${t.cupos_vendidos}/${t.cupos_totales} vendidas</span>
                    <span>${pct}%</span>
                  </div>
                  <div class="cupos-bar-wrap">
                    <div class="cupos-bar ${pct >= 100 ? 'lleno' : pct >= 80 ? 'casi-lleno' : ''}" style="width:${pct}%;"></div>
                  </div>
                </div>
              `;
            }).join('')}
          ` : '<p style="color:var(--text-muted);font-size:13px;">Sin tipos de entrada configurados.</p>'}
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cerrar</button>
          <button class="btn-pos secondary sm" onclick="cerrarModal();eventoSeleccionado=${ev.id};irSeccion('entradas')">
            🎟️ Ver entradas
          </button>
          <button class="btn-pos primary sm" onclick="cerrarModal();irSeccion('scanner')">
            📱 Validar QR
          </button>
        </div>
      </div>
    </div>
  `;
}

// ---- SCANNER QR ----
function renderScanner() {
  const content = document.getElementById('content-area');
  content.innerHTML = renderTabs() + `
    <div style="max-width:500px;margin:0 auto;">
      <div class="scanner-panel">
        <div style="font-size:48px;margin-bottom:8px;">📱</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:6px;">Validación de entradas</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
          Escaneá o ingresá el código QR de la entrada
        </div>

        <div class="scanner-input-wrap">
          <input type="text" class="scanner-input" id="qr-input"
                 placeholder="Código QR / UUID..."
                 autofocus
                 onkeydown="if(event.key==='Enter')validarQR()"
                 oninput="this.classList.remove('ok','error')">
        </div>

        <button class="btn-pos primary full lg" onclick="validarQR()" id="btn-validar">
          ✅ Validar entrada
        </button>

        <div class="scanner-result" id="scanner-result"></div>
      </div>

      <!-- Historial de validaciones de la sesión -->
      <div style="margin-top:20px;" id="validaciones-historial"></div>
    </div>
  `;

  // Auto-focus
  setTimeout(() => document.getElementById('qr-input')?.focus(), 200);
}

const historialValidaciones = [];

async function validarQR() {
  const input = document.getElementById('qr-input');
  const codigo = input?.value?.trim();
  const result = document.getElementById('scanner-result');
  const btn    = document.getElementById('btn-validar');

  if (!codigo) { UI.toast('Ingresá un código', 'warning'); return; }

  await UI.withLoading(btn, async () => {
    try {
      const res = await EventosAPI.validarQR({ codigo_qr: codigo });
      const e = res?.entrada || res;
      mostrarResultadoScanner(true, '¡Entrada válida!', e);
      historialValidaciones.unshift({ ...e, timestamp: new Date() });
      renderHistorial();

      input.value = '';
      input.focus();

    } catch (err) {
      mostrarResultadoScanner(false, err.message || 'Error al validar', null);
    }
  });
}

function mostrarResultadoScanner(ok, mensaje, entrada) {
  const input = document.getElementById('qr-input');
  const result = document.getElementById('scanner-result');

  input?.classList.add(ok ? 'ok' : 'error');
  result.className = `scanner-result visible ${ok ? 'ok' : 'error'}`;

  const e = typeof entrada === 'object' ? entrada : null;

  result.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:${e ? '10px' : '0'};">
      <span style="font-size:22px;">${ok ? '✅' : '❌'}</span>
      <span style="font-size:15px;font-weight:700;color:${ok ? 'var(--mesa-libre)' : 'var(--mesa-ocupada)'};">${mensaje}</span>
    </div>
    ${e ? `
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">
        ${e.titular_nombre ? `<div>👤 ${e.titular_nombre}</div>` : ''}
        ${e.tipo_nombre    ? `<div>🎟️ ${e.tipo_nombre}</div>` : ''}
        ${e.evento_nombre  ? `<div>🎉 ${e.evento_nombre}</div>` : ''}
      </div>
    ` : ''}
  `;
}

function renderHistorial() {
  const cont = document.getElementById('validaciones-historial');
  if (!cont || !historialValidaciones.length) return;

  cont.innerHTML = `
    <div class="card-pos">
      <div class="card-header-pos">Validadas en esta sesión (${historialValidaciones.length})</div>
      <div class="card-body-pos" style="padding:0;">
        ${historialValidaciones.slice(0, 10).map(v => `
          <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;">
            <span style="color:var(--mesa-libre);font-size:16px;">✅</span>
            <div style="flex:1;">
              <div style="font-weight:600;">${v.titular_nombre || '—'}</div>
              <div style="font-size:11px;color:var(--text-muted);">${v.tipo_nombre || ''} · ${v.timestamp.toLocaleTimeString('es-AR')}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ---- ENTRADAS ----
async function renderEntradas() {
  const content = document.getElementById('content-area');

  // Selector de evento
  const optsEventos = eventos.map(e => `<option value="${e.id}" ${e.id === eventoSeleccionado ? 'selected' : ''}>${e.nombre}</option>`).join('');

  content.innerHTML = renderTabs() + `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <select onchange="eventoSeleccionado=this.value?parseInt(this.value):null;cargarSeccion()"
              style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);padding:7px 12px;font-size:13px;font-family:var(--font-main);outline:none;flex:1;max-width:300px;">
        <option value="">Todos los eventos</option>
        ${optsEventos}
      </select>
      <span style="font-size:13px;color:var(--text-muted);">${entradas.length} entrada${entradas.length !== 1 ? 's' : ''}</span>
    </div>

    <div class="card-pos" style="overflow:hidden;">
      <div class="entrada-row header">
        <span>Titular</span>
        <span>Tipo</span>
        <span>Precio</span>
        <span>Estado</span>
        <span>Validada</span>
        <span>Código</span>
      </div>
      ${!entradas.length ? `
        <div class="empty-state"><div class="empty-state-icon">🎟️</div><div class="empty-state-title">Sin entradas</div></div>
      ` : entradas.map(e => `
        <div class="entrada-row">
          <div>
            <div style="font-weight:600;">${e.titular_nombre || '—'}</div>
            <div style="font-size:11px;color:var(--text-muted);">${e.titular_email || ''}</div>
          </div>
          <span style="font-size:12px;">${e.tipo_nombre || '—'}</span>
          <span style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;">${UI.moneda(e.precio_pagado || 0)}</span>
          <span>
            <span class="badge-pos ${entradaEstadoClass(e.estado)}" style="font-size:10px;">${e.estado}</span>
          </span>
          <span style="font-size:11px;color:var(--text-muted);">
            ${e.estado === 'validada' ? UI.fechaHora(e.validada_en) : '—'}
          </span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);">
            ${e.codigo_qr?.substring(0, 8)}…
          </span>
        </div>
      `).join('')}
    </div>
  `;
}

function entradaEstadoClass(estado) {
  const map = { pagada: 'listo', validada: 'preparando', cancelada: 'ocupada', pendiente: 'pendiente' };
  return map[estado] || 'pendiente';
}

// ---- Modal nuevo evento ----
function abrirModalNuevoEvento() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>🎉 Nuevo evento</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div class="form-pos">
            <div class="form-group">
              <label>Nombre *</label>
              <input type="text" id="ev-nombre" placeholder="Nombre del evento" required autofocus>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div class="form-group">
                <label>Fecha *</label>
                <input type="date" id="ev-fecha" required>
              </div>
              <div class="form-group">
                <label>Hora</label>
                <input type="time" id="ev-hora" value="21:00">
              </div>
            </div>
            <div class="form-group">
              <label>Descripción</label>
              <textarea id="ev-desc" rows="2" placeholder="Descripción pública del evento..."
                        style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);padding:9px 12px;font-size:14px;font-family:var(--font-main);outline:none;resize:vertical;"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary" id="btn-ev" onclick="confirmarNuevoEvento()">Crear evento</button>
        </div>
      </div>
    </div>
  `;
}

async function confirmarNuevoEvento() {
  const nombre = document.getElementById('ev-nombre')?.value?.trim();
  const fecha  = document.getElementById('ev-fecha')?.value;
  const hora   = document.getElementById('ev-hora')?.value;
  const desc   = document.getElementById('ev-desc')?.value?.trim();
  const btn    = document.getElementById('btn-ev');

  if (!nombre || !fecha) { UI.toast('Completá los campos obligatorios', 'warning'); return; }

  await UI.withLoading(btn, async () => {
    try {
      const body = { nombre, fecha };
      if (hora) body.hora = hora;
      if (desc) body.descripcion = desc;
      await api.post('/eventos/', body);
      cerrarModal();
      UI.toast('Evento creado', 'success');
      await cargarSeccion();
    } catch (e) {
      UI.toast(e.message || 'Error al crear el evento', 'error');
    }
  });
}

function cerrarModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal-container').innerHTML = '';
}

cargarSeccion();
</script>
</body>
</html>
