<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario — Backyard POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .inv-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .inv-tab {
      padding: 10px 18px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      font-family: var(--font-main);
    }
    .inv-tab:hover { color: var(--text-primary); }
    .inv-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Stock table */
    .stock-row {
      display: grid;
      grid-template-columns: 2fr 80px 80px 80px 100px 100px;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .stock-row.header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      font-weight: 600;
      background: var(--bg-card);
    }
    .stock-row:not(.header):hover { background: var(--bg-hover); }

    .stock-bar-wrap {
      height: 4px;
      background: var(--bg-elevated);
      border-radius: 2px;
      flex: 1;
      overflow: hidden;
    }
    .stock-bar {
      height: 100%;
      border-radius: 2px;
      transition: width .4s;
    }
    .stock-bar.ok    { background: var(--mesa-libre); }
    .stock-bar.bajo  { background: var(--accent); }
    .stock-bar.critico { background: var(--mesa-ocupada); }

    /* Compras */
    .orden-row {
      display: grid;
      grid-template-columns: 80px 1fr 100px 100px 120px 100px;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      cursor: pointer;
    }
    .orden-row.header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      font-weight: 600;
      background: var(--bg-card);
      cursor: default;
    }
    .orden-row:not(.header):hover { background: var(--bg-hover); }

    /* Alerta bajo stock destacada */
    .alerta-strip {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .alerta-strip-icon { font-size: 18px; }
    .alerta-strip-text { flex: 1; font-size: 13px; font-weight: 600; color: #ef4444; }
    .alerta-strip-count { font-size: 20px; font-weight: 900; color: #ef4444; }
  </style>
</head>
<body>
<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
requireRol('administrador', 'supervisor');

let seccion = 'stock';   // 'stock' | 'movimientos' | 'compras'
let materias = [];
let ordenes = [];
let movimientos = [];
let busqueda = '';

renderLayout({ title: 'Inventario', activeLink: 'inventario' });

document.getElementById('topbar-extra').innerHTML = `
  <div style="display:flex;gap:8px;">
    <button class="btn-pos secondary sm" onclick="cargarSeccion()">🔄</button>
  </div>
`;

function renderTabs() {
  return `
    <div class="inv-tabs">
      <button class="inv-tab ${seccion === 'stock'      ? 'active' : ''}" onclick="irSeccion('stock')">📦 Stock</button>
      <button class="inv-tab ${seccion === 'movimientos'? 'active' : ''}" onclick="irSeccion('movimientos')">📋 Movimientos</button>
      <button class="inv-tab ${seccion === 'compras'    ? 'active' : ''}" onclick="irSeccion('compras')">🛒 Compras</button>
    </div>
  `;
}

function irSeccion(s) {
  seccion = s;
  cargarSeccion();
}

async function cargarSeccion() {
  const content = document.getElementById('content-area');
  content.innerHTML = renderTabs() + `
    <div style="display:flex;align-items:center;justify-content:center;padding:60px;">
      <div class="spinner-pos" style="width:32px;height:32px;"></div>
    </div>
  `;

  try {
    if (seccion === 'stock') {
      const data = await api.get('/inventario/materias-primas/');
      materias = data.results || data;
      renderStock();
    } else if (seccion === 'movimientos') {
      const data = await api.get('/inventario/movimientos/', { params: { limit: 100 } });
      movimientos = data.results || data;
      renderMovimientos();
    } else {
      const data = await api.get('/inventario/ordenes/');
      ordenes = data.results || data;
      renderCompras();
    }
  } catch (e) {
    UI.toast('Error al cargar datos', 'error');
  }
}

// ---- STOCK ----
function renderStock() {
  const alertas = materias.filter(m => m.bajo_stock);
  const content = document.getElementById('content-area');

  let filtradas = materias;
  if (busqueda) {
    const q = busqueda.toLowerCase();
    filtradas = filtradas.filter(m => m.nombre.toLowerCase().includes(q));
  }

  content.innerHTML = renderTabs() + `
    <!-- Alertas -->
    ${alertas.length ? `
      <div class="alerta-strip">
        <span class="alerta-strip-icon">⚠️</span>
        <span class="alerta-strip-text">${alertas.length} materia${alertas.length !== 1 ? 's primas' : ' prima'} con stock bajo o agotado</span>
        <span class="alerta-strip-count">${alertas.length}</span>
      </div>
    ` : ''}

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px;">
      <div class="stat-card" style="padding:10px;text-align:center;">
        <div class="stat-label">Total items</div>
        <div class="stat-value" style="font-size:20px;">${materias.length}</div>
      </div>
      <div class="stat-card" style="padding:10px;text-align:center;">
        <div class="stat-label">Stock bajo</div>
        <div class="stat-value" style="font-size:20px;color:var(--mesa-ocupada);">${alertas.length}</div>
      </div>
      <div class="stat-card" style="padding:10px;text-align:center;">
        <div class="stat-label">OK</div>
        <div class="stat-value" style="font-size:20px;color:var(--mesa-libre);">${materias.length - alertas.length}</div>
      </div>
    </div>

    <!-- Buscador + Acción -->
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <div style="flex:1;position:relative;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5;pointer-events:none;">🔍</span>
        <input type="text" placeholder="Buscar materia prima..." value="${busqueda}"
               oninput="setBusquedaStock(this.value)"
               style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);padding:8px 12px 8px 32px;font-size:13px;font-family:var(--font-main);outline:none;">
      </div>
      <button class="btn-pos primary sm" onclick="abrirModalAjuste()">± Ajuste de stock</button>
    </div>

    <!-- Tabla -->
    <div class="card-pos" style="overflow:hidden;">
      <div class="stock-row header">
        <span>Materia prima</span>
        <span>Stock</span>
        <span>Mínimo</span>
        <span>Unidad</span>
        <span>Nivel</span>
        <span>Acción</span>
      </div>
      ${!filtradas.length ? `
        <div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">Sin resultados</div></div>
      ` : filtradas.map(m => {
        const pct = m.stock_minimo > 0
          ? Math.min((m.stock_actual / m.stock_minimo) * 50, 100)
          : 100;
        const cls = m.stock_actual <= 0 ? 'critico' : m.bajo_stock ? 'bajo' : 'ok';
        return `
          <div class="stock-row">
            <span style="font-weight:600;">${m.nombre}</span>
            <span style="font-weight:700;font-variant-numeric:tabular-nums;color:${cls === 'ok' ? 'var(--mesa-libre)' : cls === 'bajo' ? 'var(--accent)' : 'var(--mesa-ocupada)'};">${m.stock_actual}</span>
            <span style="color:var(--text-muted);">${m.stock_minimo}</span>
            <span style="color:var(--text-secondary);">${m.unidad_medida_nombre || m.unidad || '—'}</span>
            <div>
              <div class="stock-bar-wrap"><div class="stock-bar ${cls}" style="width:${pct}%;"></div></div>
            </div>
            <button class="btn-pos ghost sm" onclick="abrirModalAjuste(${m.id},'${m.nombre.replace(/'/g,"\\'")}')">
              Ajustar
            </button>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function setBusquedaStock(val) {
  busqueda = val;
  renderStock();
}

// ---- MOVIMIENTOS ----
function renderMovimientos() {
  const content = document.getElementById('content-area');
  content.innerHTML = renderTabs() + `
    <div class="card-pos" style="overflow:hidden;">
      <div style="display:grid;grid-template-columns:130px 2fr 1fr 80px 120px;align-items:center;gap:10px;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);font-weight:600;background:var(--bg-card);">
        <span>Fecha</span>
        <span>Materia prima</span>
        <span>Tipo</span>
        <span>Cantidad</span>
        <span>Realizado por</span>
      </div>
      ${!movimientos.length ? `
        <div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Sin movimientos</div></div>
      ` : movimientos.map(m => `
        <div style="display:grid;grid-template-columns:130px 2fr 1fr 80px 120px;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;">
          <span style="color:var(--text-muted);font-size:11px;">${UI.fechaHora(m.creado_en)}</span>
          <span style="font-weight:600;">${m.materia_prima_nombre || '—'}</span>
          <span>
            <span class="badge-pos ${m.tipo === 'entrada' ? 'listo' : m.tipo === 'salida' ? 'ocupada' : 'pendiente'}" style="font-size:10px;">
              ${m.tipo}
            </span>
          </span>
          <span style="font-weight:700;font-variant-numeric:tabular-nums;color:${m.tipo === 'entrada' ? 'var(--mesa-libre)' : m.tipo === 'salida' ? 'var(--mesa-ocupada)' : 'var(--accent)'};">
            ${m.tipo === 'salida' ? '−' : '+'}${m.cantidad}
          </span>
          <span style="font-size:12px;color:var(--text-muted);">${m.realizado_por_nombre || '—'}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ---- COMPRAS ----
function renderCompras() {
  const content = document.getElementById('content-area');
  content.innerHTML = renderTabs() + `
    <div style="margin-bottom:12px;display:flex;justify-content:flex-end;">
      <button class="btn-pos primary sm" onclick="abrirModalNuevaOrden()">+ Nueva orden de compra</button>
    </div>
    <div class="card-pos" style="overflow:hidden;">
      <div class="orden-row header">
        <span>#</span>
        <span>Proveedor</span>
        <span>Fecha</span>
        <span>Items</span>
        <span>Estado</span>
        <span>Total</span>
      </div>
      ${!ordenes.length ? `
        <div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-title">Sin órdenes de compra</div></div>
      ` : ordenes.map(o => `
        <div class="orden-row" onclick="abrirDetalleOrden(${o.id})">
          <span style="font-weight:800;color:var(--accent);">#${o.numero || o.id}</span>
          <span style="font-weight:600;">${o.proveedor_nombre || '—'}</span>
          <span style="font-size:12px;color:var(--text-muted);">${UI.fechaHora(o.fecha || o.creado_en)}</span>
          <span style="color:var(--text-muted);">${o.items?.length || 0} ítem${o.items?.length !== 1 ? 's' : ''}</span>
          <span>
            <span class="badge-pos ${estadoOrdenClass(o.estado)}" style="font-size:10px;">${o.estado}</span>
          </span>
          <span style="font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;">${UI.moneda(o.total || 0)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function estadoOrdenClass(estado) {
  const map = { borrador: 'pendiente', enviada: 'reservada', recibida: 'listo', cancelada: 'ocupada' };
  return map[estado] || 'pendiente';
}

// ---- Modal ajuste de stock ----
function abrirModalAjuste(materiaId, materiaNombre) {
  const opts = materias.map(m => `<option value="${m.id}" ${m.id === materiaId ? 'selected' : ''}>${m.nombre} (${m.stock_actual} ${m.unidad_medida_nombre || ''})</option>`).join('');
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>± Ajuste de stock</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div class="form-pos">
            <div class="form-group">
              <label>Materia prima *</label>
              <select id="ajuste-materia">${opts}</select>
            </div>
            <div class="form-group">
              <label>Tipo de movimiento *</label>
              <select id="ajuste-tipo">
                <option value="entrada">📥 Entrada (suma stock)</option>
                <option value="salida">📤 Salida (resta stock)</option>
                <option value="ajuste">⚖️ Ajuste manual (establece valor exacto)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Cantidad *</label>
              <input type="number" id="ajuste-cantidad" placeholder="0" min="0" step="0.01" autofocus>
            </div>
            <div class="form-group">
              <label>Motivo</label>
              <input type="text" id="ajuste-motivo" placeholder="Merma, corrección de inventario, etc.">
            </div>
          </div>
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary" id="btn-ajuste" onclick="confirmarAjuste()">Aplicar ajuste</button>
        </div>
      </div>
    </div>
  `;
}

async function confirmarAjuste() {
  const materia  = parseInt(document.getElementById('ajuste-materia')?.value);
  const tipo     = document.getElementById('ajuste-tipo')?.value;
  const cantidad = parseFloat(document.getElementById('ajuste-cantidad')?.value || 0);
  const motivo   = document.getElementById('ajuste-motivo')?.value?.trim();
  const btn      = document.getElementById('btn-ajuste');

  if (!materia || !tipo || cantidad <= 0) {
    UI.toast('Completá todos los campos', 'warning');
    return;
  }

  await UI.withLoading(btn, async () => {
    try {
      await api.post('/inventario/ajuste/', { materia_prima: materia, tipo, cantidad, motivo });
      cerrarModal();
      UI.toast('Ajuste aplicado', 'success');
      await cargarSeccion();
    } catch (e) {
      UI.toast(e.message || 'Error al aplicar ajuste', 'error');
    }
  });
}

// ---- Modal nueva orden ----
async function abrirModalNuevaOrden() {
  let proveedores = [];
  try {
    const data = await api.get('/inventario/proveedores/');
    proveedores = data.results || data;
  } catch {}

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>🛒 Nueva orden de compra</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div class="form-pos">
            <div class="form-group">
              <label>Proveedor *</label>
              <select id="orden-proveedor">
                <option value="">Seleccioná un proveedor</option>
                ${proveedores.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Fecha estimada de entrega</label>
              <input type="date" id="orden-fecha">
            </div>
            <div class="form-group">
              <label>Observaciones</label>
              <input type="text" id="orden-obs" placeholder="Opcional">
            </div>
          </div>
          <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">
            Tras crear la orden podrás agregar los ítems desde el detalle.
          </p>
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary" id="btn-orden" onclick="confirmarNuevaOrden()">Crear orden</button>
        </div>
      </div>
    </div>
  `;
}

async function confirmarNuevaOrden() {
  const proveedor = parseInt(document.getElementById('orden-proveedor')?.value);
  const fecha     = document.getElementById('orden-fecha')?.value;
  const obs       = document.getElementById('orden-obs')?.value?.trim();
  const btn       = document.getElementById('btn-orden');

  if (!proveedor) { UI.toast('Seleccioná un proveedor', 'warning'); return; }

  await UI.withLoading(btn, async () => {
    try {
      const body = { proveedor };
      if (fecha) body.fecha_estimada_entrega = fecha;
      if (obs) body.observaciones = obs;
      await api.post('/inventario/ordenes/', body);
      cerrarModal();
      UI.toast('Orden de compra creada', 'success');
      await cargarSeccion();
    } catch (e) {
      UI.toast(e.message || 'Error al crear la orden', 'error');
    }
  });
}

async function abrirDetalleOrden(id) {
  const o = ordenes.find(x => x.id === id);
  if (!o) return;

  const items = o.items || [];
  const sigEstado = { borrador: 'enviada', enviada: 'recibida' };
  const sig = sigEstado[o.estado];

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" style="max-width:520px;" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>Orden #${o.numero || o.id} — ${o.proveedor_nombre || '—'}</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;">
            <span class="badge-pos ${estadoOrdenClass(o.estado)}">${o.estado}</span>
            <span style="font-size:12px;color:var(--text-muted);">${UI.fechaHora(o.creado_en)}</span>
          </div>
          ${items.length ? `
            <div style="margin-bottom:12px;">
              ${items.map(i => `
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
                  <span>${i.materia_prima_nombre || '—'}</span>
                  <span style="color:var(--text-secondary);">${i.cantidad} ${i.unidad || ''}</span>
                  <span style="font-weight:700;color:var(--accent);">${UI.moneda(i.precio_unitario * i.cantidad)}</span>
                </div>
              `).join('')}
              <div style="display:flex;justify-content:space-between;padding:10px 0 0;font-weight:800;">
                <span>Total</span>
                <span style="color:var(--accent);">${UI.moneda(o.total || 0)}</span>
              </div>
            </div>
          ` : `<p style="color:var(--text-muted);font-size:13px;">Sin ítems cargados.</p>`}
        </div>
        <div class="modal-pos-footer">
          ${o.estado === 'cancelada' || o.estado === 'recibida' ? '' : `
            <button class="btn-pos danger sm" onclick="cambiarEstadoOrden(${o.id},'cancelada')">✕ Cancelar</button>
          `}
          <button class="btn-pos ghost" onclick="cerrarModal()">Cerrar</button>
          ${sig ? `
            <button class="btn-pos primary" onclick="cambiarEstadoOrden(${o.id},'${sig}')">
              → Marcar como ${sig}
            </button>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

async function cambiarEstadoOrden(id, estado) {
  if (estado === 'recibida' && !UI.confirm('¿Confirmar recepción? Esto actualizará el stock automáticamente.')) return;
  try {
    await api.post(`/inventario/ordenes/${id}/estado/`, { estado });
    cerrarModal();
    UI.toast(`Orden → ${estado}`, 'success');
    await cargarSeccion();
  } catch (e) {
    UI.toast(e.message || 'Error', 'error');
  }
}

function cerrarModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal-container').innerHTML = '';
}

cargarSeccion();
</script>
</body>
</html>
