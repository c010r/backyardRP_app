<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comanda — Backyard POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { overflow: hidden; }

    .comanda-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: calc(100vh - var(--topbar-height));
    }

    /* Panel izquierdo: catálogo */
    .catalogo-panel {
      overflow-y: auto;
      padding: 14px;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Panel derecho: ticket */
    .ticket-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    .ticket-header {
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ticket-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ticket-meta-item {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .ticket-items {
      flex: 1;
      overflow-y: auto;
    }

    .ticket-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }

    .ticket-item:hover { background: var(--bg-hover); }

    .ticket-item.cancelado {
      opacity: .4;
      text-decoration: line-through;
    }

    .ticket-qty-ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qty-btn {
      width: 26px; height: 26px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .qty-btn:hover { background: var(--bg-hover); }
    .qty-btn.minus:hover { background: rgba(239,68,68,.2); color: #ef4444; }

    .ticket-qty-num {
      font-weight: 700;
      font-size: 14px;
      min-width: 20px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .ticket-item-info { flex: 1; min-width: 0; }
    .ticket-item-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ticket-item-obs {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }
    .ticket-item-estado {
      font-size: 10px;
    }
    .ticket-item-precio {
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .ticket-item-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      transition: color .12s, background .12s;
    }
    .ticket-item-del:hover { color: #ef4444; background: rgba(239,68,68,.12); }

    .ticket-footer {
      padding: 14px 16px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
    }

    .totales {
      margin-bottom: 12px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }
    .total-row .label { color: var(--text-secondary); }
    .total-row .val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .total-row.grande .label { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .total-row.grande .val { font-size: 22px; font-weight: 800; color: var(--accent); }

    .acciones-ticket {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Buscador */
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 9px 14px 9px 38px;
      font-size: 14px;
      font-family: var(--font-main);
      outline: none;
      transition: border-color .15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: .5;
    }

    /* Modal obs */
    .obs-modal-inner {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Modal cobro */
    .cobro-medios {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .medio-btn {
      padding: 8px 6px;
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .medio-btn .medio-icon { font-size: 18px; }
    .medio-btn:hover, .medio-btn.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    @media (max-width: 700px) {
      .comanda-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .catalogo-panel { max-height: 45vh; }
    }
  </style>
</head>
<body>
<script src="http://localhost/assets/js/api.js?v=2"></script>
<script>
requireLogin();

const params = new URLSearchParams(location.search);
const comandaId  = params.get('id');
const accionInit = params.get('accion');

if (!comandaId) {
  UI.toast('Comanda no especificada', 'error');
  setTimeout(() => location.href = 'mesas.html', 1500);
}

// Estado
let comanda     = null;
let categorias  = [];
let productos   = [];
let catActiva   = null;
let busqueda    = '';
let itemPendienteObs = null; // {productoId, nombre}

renderLayout({ title: 'Cargando comanda...', activeLink: 'comandas' });

async function iniciar() {
  await Promise.all([cargarComanda(), cargarCatalogo()]);
  renderComandaLayout();
  renderCatalogo();
  renderTicket();
  if (accionInit === 'cobrar') {
    setTimeout(abrirModalCobro, 400);
  }
}

async function cargarComanda() {
  try {
    comanda = await ComandasAPI.detalle(comandaId);
    document.getElementById('topbar-title').textContent =
      `Comanda #${comanda.numero || comanda.id} — ${comanda.mesa_etiqueta || 'Sin mesa'}`;
  } catch (e) {
    UI.toast('Error al cargar la comanda', 'error');
  }
}

async function cargarCatalogo() {
  try {
    const [cats, prods] = await Promise.all([
      CatalogoAPI.categorias(),
      CatalogoAPI.productos({ disponible: true }),
    ]);
    categorias = cats.results || cats;
    productos  = prods.results || prods;
  } catch (e) {
    UI.toast('Error al cargar el catálogo', 'error');
  }
}

function renderComandaLayout() {
  const content = document.getElementById('content-area');
  content.className = 'content-area no-padding';
  content.style.overflow = 'hidden';
  content.style.display = 'block';
  content.innerHTML = `
    <div class="comanda-layout">
      <!-- Catálogo -->
      <div class="catalogo-panel" id="catalogo-panel">
        <div class="search-box">
          <span class="search-box-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Buscar producto..." oninput="filtrarBusqueda(this.value)">
        </div>
        <div class="cat-tabs" id="cat-tabs"></div>
        <div class="productos-grid" id="productos-grid"></div>
      </div>

      <!-- Ticket -->
      <div class="ticket-panel" id="ticket-panel"></div>
    </div>
  `;
}

function renderCatalogo() {
  const tabs = document.getElementById('cat-tabs');
  const grid = document.getElementById('productos-grid');
  if (!tabs || !grid) return;

  // Tabs de categorías
  tabs.innerHTML = `
    <button class="cat-tab ${!catActiva ? 'active' : ''}" onclick="filtrarCat(null, this)">Todos</button>
    ${categorias.map(c => `
      <button class="cat-tab ${catActiva === c.id ? 'active' : ''}"
              onclick="filtrarCat(${c.id}, this)">${c.nombre}</button>
    `).join('')}
  `;

  // Filtrar productos
  let prods = productos;
  if (catActiva) prods = prods.filter(p => p.categoria === catActiva || p.categoria_id === catActiva);
  if (busqueda) {
    const q = busqueda.toLowerCase();
    prods = prods.filter(p => p.nombre.toLowerCase().includes(q));
  }

  if (!prods.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;padding:30px;">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-title">Sin resultados</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = prods.map(p => `
    <div class="producto-card ${p.disponible === false ? 'sin-stock' : ''}"
         onclick="agregarProducto(${p.id}, '${p.nombre.replace(/'/g, "\\'")}', ${p.precio_venta})">
      <div class="producto-nombre">${p.nombre}</div>
      <div class="producto-precio">${UI.moneda(p.precio_venta)}</div>
      ${p.disponible === false ? '<div style="font-size:10px;color:var(--mesa-sucia);margin-top:3px;">Sin stock</div>' : ''}
    </div>
  `).join('');
}

function filtrarCat(id, btn) {
  catActiva = id;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderCatalogo();
}

function filtrarBusqueda(val) {
  busqueda = val;
  renderCatalogo();
}

function renderTicket() {
  const panel = document.getElementById('ticket-panel');
  if (!panel || !comanda) return;

  const items = comanda.items || [];
  const activos = items.filter(i => !i.cancelado);
  const subtotal = activos.reduce((s, i) => s + parseFloat(i.subtotal || 0), 0);

  const estadoComanda = comanda.estado || 'abierta';
  const cerrada = ['cerrada','pagada'].includes(estadoComanda);

  panel.innerHTML = `
    <div class="ticket-header">
      <div class="ticket-meta">
        <span class="badge-pos ${estadoComanda.toLowerCase()}">${estadoComanda}</span>
        <span class="ticket-meta-item">${comanda.mesa_etiqueta || 'Sin mesa'}</span>
        <span class="ticket-meta-item">Mozo: ${comanda.mozo_nombre || '—'}</span>
        <span class="ticket-meta-item">${UI.fechaHora(comanda.creado_en)}</span>
      </div>
    </div>

    <div class="ticket-items" id="ticket-items">
      ${!activos.length ? `
        <div class="empty-state">
          <div class="empty-state-icon">🧾</div>
          <div class="empty-state-title">Comanda vacía</div>
          <div class="empty-state-sub">Agregá productos desde el catálogo</div>
        </div>
      ` : activos.map(item => `
        <div class="ticket-item ${item.cancelado ? 'cancelado' : ''}">
          <div class="ticket-qty-ctrl">
            ${!cerrada ? `<button class="qty-btn minus" onclick="cambiarCantidad(${item.id}, -1)">−</button>` : ''}
            <span class="ticket-qty-num">${item.cantidad}</span>
            ${!cerrada ? `<button class="qty-btn" onclick="cambiarCantidad(${item.id}, 1)">+</button>` : ''}
          </div>
          <div class="ticket-item-info">
            <div class="ticket-item-name">${item.producto_nombre}</div>
            ${item.observaciones ? `<div class="ticket-item-obs">${item.observaciones}</div>` : ''}
            <div class="ticket-item-estado">
              <span class="badge-pos ${(item.estado_cocina || 'pendiente').toLowerCase()}" style="font-size:9px;padding:2px 5px;">
                ${item.estado_cocina || 'Sin enviar'}
              </span>
            </div>
          </div>
          <div class="ticket-item-precio">${UI.moneda(item.subtotal)}</div>
          ${!cerrada ? `<button class="ticket-item-del" onclick="quitarItem(${item.id})" title="Quitar">✕</button>` : ''}
        </div>
      `).join('')}
    </div>

    <div class="ticket-footer">
      <div class="totales">
        <div class="total-row">
          <span class="label">Subtotal</span>
          <span class="val">${UI.moneda(subtotal)}</span>
        </div>
        <div class="total-row grande" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;">
          <span class="label">TOTAL</span>
          <span class="val">${UI.moneda(subtotal)}</span>
        </div>
      </div>

      ${!cerrada ? `
        <div class="acciones-ticket">
          <button class="btn-pos secondary" onclick="enviarCocina()" ${!activos.length ? 'disabled' : ''}>
            👨‍🍳 Enviar cocina
          </button>
          <button class="btn-pos primary" onclick="abrirModalCobro()" ${!activos.length ? 'disabled' : ''}>
            💳 Cobrar
          </button>
          <button class="btn-pos ghost" onclick="history.back()">
            ← Volver
          </button>
          <button class="btn-pos secondary" onclick="abrirModalObs()">
            📝 Observación
          </button>
        </div>
      ` : `
        <div style="display:flex;gap:8px;">
          <button class="btn-pos ghost full" onclick="history.back()">← Volver a mesas</button>
        </div>
      `}
    </div>
  `;
}

// ---- Acciones ----

async function agregarProducto(productoId, nombre, precio) {
  if (!comanda || ['cerrada','pagada'].includes(comanda.estado)) {
    UI.toast('La comanda está cerrada', 'warning');
    return;
  }

  // Verificar si ya existe en comanda → incrementar
  const existente = (comanda.items || []).find(i => i.producto === productoId && !i.cancelado && !i.enviado_cocina);
  if (existente) {
    await cambiarCantidad(existente.id, 1);
    return;
  }

  // Pedir observación opcional
  itemPendienteObs = { productoId, nombre, precio };
  abrirModalObsProducto();
}

function abrirModalObsProducto() {
  const { nombre, precio } = itemPendienteObs;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>Agregar: ${nombre}</span>
          <button class="btn-pos ghost icon-only" onclick="confirmarAgregar(null);cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div style="font-size:22px;font-weight:800;color:var(--accent);margin-bottom:14px;">${UI.moneda(precio)}</div>
          <div class="form-pos">
            <div class="form-group">
              <label>Observación (opcional)</label>
              <input type="text" id="obs-input" placeholder="Sin cebolla, bien cocido, etc."
                     autofocus maxlength="200">
            </div>
          </div>
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary" onclick="confirmarAgregar(document.getElementById('obs-input').value)">
            ➕ Agregar
          </button>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('obs-input')?.focus(), 100);
}

async function confirmarAgregar(obs) {
  cerrarModal();
  if (!itemPendienteObs) return;
  const { productoId } = itemPendienteObs;
  itemPendienteObs = null;

  try {
    const body = { producto: productoId, cantidad: 1 };
    if (obs) body.observaciones = obs;
    await ComandasAPI.agregarItem(comandaId, body);
    await cargarComanda();
    renderTicket();
    UI.toast('Producto agregado', 'success', 1500);
  } catch (e) {
    UI.toast(e.message || 'Error al agregar producto', 'error');
  }
}

async function cambiarCantidad(itemId, delta) {
  const item = (comanda.items || []).find(i => i.id === itemId);
  if (!item) return;

  if (delta < 0) {
    // Cancela el ítem completo (no hay endpoint de actualización parcial)
    await quitarItem(itemId);
    return;
  }

  // delta > 0: agrega una unidad más del mismo producto
  try {
    await ComandasAPI.agregarItem(comandaId, { producto: item.producto, cantidad: 1 });
    await cargarComanda();
    renderTicket();
  } catch (e) {
    UI.toast(e.message || 'Error al agregar unidad', 'error');
  }
}

async function quitarItem(itemId) {
  try {
    await ComandasAPI.cancelarItem(comandaId, itemId);
    comanda.items = (comanda.items || []).filter(i => i.id !== itemId);
    renderTicket();
    UI.toast('Ítem quitado', 'info', 1500);
    await cargarComanda();
    renderTicket();
  } catch (e) {
    UI.toast(e.message || 'Error al quitar ítem', 'error');
  }
}

async function enviarCocina() {
  const items = (comanda.items || []).filter(i => !i.cancelado && !i.enviado_cocina);
  if (!items.length) {
    UI.toast('Todos los ítems ya fueron enviados a cocina', 'warning');
    return;
  }
  try {
    await ComandasAPI.enviarCocina(comandaId);
    UI.toast('Enviado a cocina', 'success');
    await cargarComanda();
    renderTicket();
  } catch (e) {
    UI.toast(e.message || 'Error al enviar a cocina', 'error');
  }
}

// ---- Modal cobro ----
function abrirModalCobro() {
  const activos = (comanda?.items || []).filter(i => !i.cancelado);
  const total = activos.reduce((s, i) => s + parseFloat(i.subtotal || 0), 0);

  const medios = [
    { key: 'efectivo',      icon: '💵', label: 'Efectivo' },
    { key: 'debito',        icon: '💳', label: 'Débito' },
    { key: 'credito',       icon: '💳', label: 'Crédito' },
    { key: 'transferencia', icon: '🏦', label: 'Transferencia' },
    { key: 'qr',            icon: '📱', label: 'QR' },
    { key: 'mercado_pago',  icon: '🟦', label: 'Mercado Pago' },
  ];

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" style="max-width:500px;" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>Cobrar comanda</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div style="font-size:26px;font-weight:900;color:var(--accent);text-align:center;margin-bottom:12px;font-variant-numeric:tabular-nums;">
            ${UI.moneda(total)}
          </div>

          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em;">
            Medio de pago
          </div>
          <div class="cobro-medios" id="cobro-medios">
            ${medios.map(m => `
              <button class="medio-btn" id="medio-${m.key}" onclick="seleccionarMedio('${m.key}')">
                <span class="medio-icon">${m.icon}</span>
                ${m.label}
              </button>
            `).join('')}
          </div>

          <div class="form-pos">
            <div class="form-group" id="monto-efectivo-wrap" style="display:none;">
              <label>Monto recibido (efectivo)</label>
              <input type="number" id="monto-recibido" placeholder="0.00" min="0" step="0.01"
                     oninput="calcularVuelto()">
              <div id="vuelto-info" style="margin-top:6px;font-size:13px;color:var(--mesa-libre);font-weight:600;"></div>
            </div>
            <div class="form-group">
              <label>Propina (opcional)</label>
              <input type="number" id="propina-input" placeholder="0.00" min="0" step="0.01">
            </div>
            <div class="form-group">
              <label>Comprobante DGI</label>
              <select id="cobro-tipo-cfe" onchange="toggleCfeFields()">
                <option value="101">e-Ticket (Consumidor Final)</option>
                <option value="111">e-Factura (Empresa)</option>
              </select>
            </div>
            <div class="form-group" id="cfe-doc-wrap">
              <label>RUT / CI <span style="font-size:11px;color:#aaa;">(Opcional para e-Ticket)</span></label>
              <input type="text" id="cobro-documento" placeholder="Ej: 21XXXXXX001X">
            </div>
            <div class="form-group" id="cfe-razon-wrap" style="display:none;">
              <label>Razón Social <span style="font-size:11px;color:#aaa;">(Requerido para e-Factura)</span></label>
              <input type="text" id="cobro-razon-social" placeholder="Nombre completo de la empresa">
            </div>
            <div class="form-group">
              <label>Observaciones</label>
              <input type="text" id="cobro-obs" placeholder="Referencia, notas, etc.">
            </div>
          </div>
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary lg" id="btn-confirmar-cobro" onclick="confirmarCobro()" disabled>
            ✅ Confirmar cobro
          </button>
        </div>
      </div>
    </div>
  `;
}

let medioSeleccionado = null;

function seleccionarMedio(key) {
  medioSeleccionado = key;
  document.querySelectorAll('.medio-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`medio-${key}`)?.classList.add('selected');
  document.getElementById('btn-confirmar-cobro').disabled = false;

  const efectivoWrap = document.getElementById('monto-efectivo-wrap');
  if (key === 'efectivo') {
    efectivoWrap.style.display = 'block';
    document.getElementById('monto-recibido')?.focus();
  } else {
    efectivoWrap.style.display = 'none';
  }
}

function calcularVuelto() {
  const activos = (comanda?.items || []).filter(i => !i.cancelado);
  const total = activos.reduce((s, i) => s + parseFloat(i.subtotal || 0), 0);
  const recibido = parseFloat(document.getElementById('monto-recibido')?.value || 0);
  const vuelto = recibido - total;
  const info = document.getElementById('vuelto-info');
  if (info) {
    if (recibido > 0) {
      info.textContent = vuelto >= 0 ? `Vuelto: ${UI.moneda(vuelto)}` : `Falta: ${UI.moneda(-vuelto)}`;
      info.style.color = vuelto >= 0 ? 'var(--mesa-libre)' : 'var(--mesa-ocupada)';
    } else {
      info.textContent = '';
    }
  }
}

async function confirmarCobro() {
  if (!medioSeleccionado) {
    UI.toast('Seleccioná un medio de pago', 'warning');
    return;
  }

  const activos = (comanda?.items || []).filter(i => !i.cancelado);
  const total = activos.reduce((s, i) => s + parseFloat(i.subtotal || 0), 0);
  const propina = parseFloat(document.getElementById('propina-input')?.value || 0);
  const obs = document.getElementById('cobro-obs')?.value || '';

  const btn = document.getElementById('btn-confirmar-cobro');

  await UI.withLoading(btn, async () => {
    try {
      await CajaAPI.cobrar({
        comanda_id: parseInt(comandaId),
        pagos: [{ medio_pago: medioSeleccionado, monto: total, propina }],
      });
      
      const tipoCfe = document.getElementById('cobro-tipo-cfe')?.value;
      let razonSocial = document.getElementById('cobro-razon-social')?.value || 'Consumidor Final';
      let docReceptor = document.getElementById('cobro-documento')?.value || '';
      let tipoDoc = tipoCfe === '111' ? 'RUT' : 'CI';
      
      if (tipoCfe === '111' && (!docReceptor || !razonSocial || razonSocial === 'Consumidor Final')) {
        UI.toast('Cobro exitoso, pero faltan datos para generar la e-Factura', 'warning');
      } else {
        try {
          await FacturacionAPI.emitir({
            tipo: tipoCfe,
            comanda_id: parseInt(comandaId),
            razon_social_receptor: razonSocial,
            documento_receptor: docReceptor,
            tipo_documento_receptor: tipoDoc,
          });
          UI.toast('Cobro y comprobante registrados', 'success');
        } catch (eFact) {
          UI.toast('Cobro exitoso. Error al emitir comprobante: ' + (eFact.message || ''), 'warning');
        }
      }

      cerrarModal();
      setTimeout(() => location.href = 'mesas.html', 1200);
    } catch (e) {
      UI.toast(e.message || 'Error al registrar el cobro', 'error');
    }
  });
}

function toggleCfeFields() {
  const tipo = document.getElementById('cobro-tipo-cfe').value;
  const docWrap = document.getElementById('cfe-doc-wrap');
  const razonWrap = document.getElementById('cfe-razon-wrap');
  if (tipo === '111') {
    razonWrap.style.display = 'block';
  } else {
    razonWrap.style.display = 'none';
  }
}

function cerrarModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal-container').innerHTML = '';
  medioSeleccionado = null;
}

function abrirModalObs() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-pos-backdrop" onclick="cerrarModal(event)">
      <div class="modal-pos" onclick="event.stopPropagation()">
        <div class="modal-pos-header">
          <span>Observación de comanda</span>
          <button class="btn-pos ghost icon-only" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-pos-body">
          <div class="form-pos">
            <div class="form-group">
              <label>Observación general</label>
              <textarea id="obs-comanda" rows="3" placeholder="Alérgicos, requerimientos especiales..."
                        style="resize:vertical;">${comanda?.observaciones || ''}</textarea>
            </div>
          </div>
        </div>
        <div class="modal-pos-footer">
          <button class="btn-pos ghost" onclick="cerrarModal()">Cancelar</button>
          <button class="btn-pos primary" onclick="guardarObs()">Guardar</button>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('obs-comanda')?.focus(), 100);
}

async function guardarObs() {
  const obs = document.getElementById('obs-comanda')?.value || '';
  try {
    await api.patch(`/comandas/${comandaId}/`, { observaciones: obs });
    comanda.observaciones = obs;
    cerrarModal();
    UI.toast('Observación guardada', 'success', 1500);
  } catch (e) {
    UI.toast(e.message || 'Error al guardar observación', 'error');
  }
}

iniciar();
</script>
